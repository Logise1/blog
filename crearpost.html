<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nuevo Post - Logise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' } } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased p-4 sm:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        
        <div class="bg-brand-500 text-white p-6">
            <h1 class="text-2xl font-bold">Publicar en El rincón de Logise</h1>
            <p class="text-brand-100 text-sm mt-1">Escribe tu artículo y genera el archivo JSON actualizado.</p>
        </div>

        <div class="p-6 space-y-6">
            
            <div id="status-msg" class="text-sm bg-blue-50 text-blue-600 p-3 rounded-lg hidden"></div>

            <!-- Formulario -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Título del Artículo</label>
                    <input type="text" id="post-title" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="Escribe el título aquí...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Categoría</label>
                    <input type="text" id="post-category" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Ej: Reflexiones, Tecnología...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Resumen (Excerpt)</label>
                    <input type="text" id="post-excerpt" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Breve descripción para la portada...">
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Contenido</label>
                    
                    <!-- Barra de herramientas simple -->
                    <div class="bg-gray-100 border border-gray-300 border-b-0 rounded-t-lg p-2 flex gap-2">
                        <button type="button" onclick="formatDoc('bold')" class="px-3 py-1 bg-white border border-gray-200 rounded shadow-sm hover:bg-gray-50 font-bold">B</button>
                        <button type="button" onclick="formatDoc('italic')" class="px-3 py-1 bg-white border border-gray-200 rounded shadow-sm hover:bg-gray-50 italic">I</button>
                        <button type="button" onclick="formatDoc('formatBlock', 'H3')" class="px-3 py-1 bg-white border border-gray-200 rounded shadow-sm hover:bg-gray-50 text-sm font-semibold">Subtítulo</button>
                        <button type="button" onclick="formatDoc('insertUnorderedList')" class="px-3 py-1 bg-white border border-gray-200 rounded shadow-sm hover:bg-gray-50 text-sm">Lista</button>
                    </div>
                    
                    <!-- Editor rico -->
                    <div id="post-content" contenteditable="true" class="w-full border border-gray-300 rounded-b-lg p-4 min-h-[250px] focus:ring-2 focus:ring-brand-500 outline-none prose max-w-none bg-white"></div>
                    <p class="text-xs text-gray-500 mt-2">Puedes usar las herramientas de arriba o pegar directamente el texto.</p>
                </div>
            </div>

            <!-- Botón Generar -->
            <div class="pt-4 border-t border-gray-100">
                <button onclick="generateJSON()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                    Generar Nuevo posts.json
                </button>
            </div>

            <!-- Área de Resultados (Oculta por defecto) -->
            <div id="result-area" class="hidden mt-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-2">¡JSON Generado!</h3>
                <p class="text-sm text-gray-600 mb-4">Haz clic en el botón de abajo para descargar el archivo, y reemplázalo en la carpeta de tu blog.</p>
                
                <textarea id="json-output" class="w-full h-32 p-2 text-xs font-mono bg-white border border-gray-300 rounded mb-3" readonly></textarea>
                
                <div class="flex gap-3">
                    <button onclick="downloadJSON()" class="flex-1 bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-center">
                        📥 Descargar posts.json
                    </button>
                    <button onclick="copyJSON()" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-semibold py-2 px-4 rounded-lg transition-colors">
                        📋 Copiar Texto
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let existingPosts = [];

        // Al cargar la página, intentar leer los posts anteriores para no perderlos
        document.addEventListener('DOMContentLoaded', async () => {
            const statusMsg = document.getElementById('status-msg');
            try {
                const res = await fetch('posts.json', { cache: 'no-store' });
                if (res.ok) {
                    existingPosts = await res.json();
                    statusMsg.textContent = `Se cargaron ${existingPosts.length} posts anteriores correctamente. Tu nuevo post se añadirá al principio.`;
                    statusMsg.classList.remove('hidden');
                }
            } catch (e) {
                console.log("No se encontró posts.json anterior, se creará uno nuevo desde cero.");
            }
        });

        // Comandos de formato para el editor
        function formatDoc(cmd, value=null) {
            document.execCommand(cmd, false, value);
            document.getElementById('post-content').focus();
        }

        // Generar JSON
        function generateJSON() {
            const title = document.getElementById('post-title').value.trim();
            const category = document.getElementById('post-category').value.trim() || 'General';
            const excerpt = document.getElementById('post-excerpt').value.trim();
            
            // Extraer el HTML del editor contenteditable
            let contentHTML = document.getElementById('post-content').innerHTML;
            
            // Limpieza básica (si el editor está vacío a veces deja un <br>)
            if (contentHTML === '<br>') contentHTML = '';

            if (!title || !contentHTML) {
                alert("Por favor, ponle al menos un título y contenido a tu post.");
                return;
            }

            // Calcular tiempo de lectura (aprox 200 palabras por minuto)
            const textContent = document.getElementById('post-content').innerText;
            const wordCount = textContent.split(/\s+/).filter(word => word.length > 0).length;
            let readMins = Math.ceil(wordCount / 200);
            if (readMins < 1) readMins = 1;

            // Formatear la fecha actual al estilo "14 May, 2026"
            const dateObj = new Date();
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('es-ES', options).replace(/ de /g, ' ');

            // Crear el objeto del nuevo post
            const newPost = {
                id: Date.now(), // ID único basado en el timestamp
                title: title,
                excerpt: excerpt || contentHTML.substring(0, 100).replace(/(<([^>]+)>)/gi, "") + '...', // Si no hay excerpt, saca uno del contenido
                content: contentHTML,
                date: formattedDate,
                category: category,
                readTime: `${readMins} min`
            };

            // Clonar el array anterior y poner el nuevo post al principio
            const updatedPosts = [newPost, ...existingPosts];

            // Convertir a texto JSON con indentación
            const jsonString = JSON.stringify(updatedPosts, null, 2);

            // Mostrar resultado
            document.getElementById('json-output').value = jsonString;
            document.getElementById('result-area').classList.remove('hidden');
            
            // Hacer scroll hacia el resultado
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        }

        // Descargar el archivo
        function downloadJSON() {
            const jsonText = document.getElementById('json-output').value;
            const blob = new Blob([jsonText], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'posts.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Copiar al portapapeles
        function copyJSON() {
            const textarea = document.getElementById('json-output');
            textarea.select();
            document.execCommand('copy');
            alert('¡JSON copiado al portapapeles!');
        }
    </script>
</body>
</html>
